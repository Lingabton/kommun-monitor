name: Daily Update & Deploy

on:
  schedule:
    - cron: '0 7 * * *'  # 08:00 Swedish time
  workflow_dispatch:       # Manual trigger
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic pdfplumber requests beautifulsoup4

      - name: Scrape new protocols
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd scripts && python3 scraper.py --max 5 --model haiku
        continue-on-error: true

      - name: Build analytics
        run: |
          cd scripts
          python3 analytics.py --base-url "https://${{ github.repository_owner }}.github.io/kommun-monitor"
          python3 build_api.py --base-url "https://${{ github.repository_owner }}.github.io/kommun-monitor"
          python3 insights.py --base-url "https://${{ github.repository_owner }}.github.io/kommun-monitor"

      - name: Commit data changes
        run: |
          git config user.name "Kommun Monitor Bot"
          git config user.email "bot@kommun-monitor.se"
          git add -A
          git diff --staged --quiet || git commit -m "🏛️ Auto-update $(date +%Y-%m-%d)"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
