name: Kommun Monitor — Daily Auto-Discovery

on:
  schedule:
    # Run at 07:00 and 14:00 Stockholm time (05:00 and 12:00 UTC)
    # 07:00 catches overnight protocol postings
    # 14:00 catches same-day postings (protocols often posted mid-day)
    - cron: '0 5 * * *'
    - cron: '0 12 * * 1-5'   # Weekdays only for the afternoon run
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto           # Full pipeline
          - discover-only  # Just check RSS, don't process
          - retry          # Retry protocols missing PDFs
          - backfill-2025  # Backfill 2025 protocols
          - backfill-2026  # Backfill 2026 protocols
          - process-known  # Process all from known_protocols.json
          - dry-run        # Show what would happen

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install anthropic pdfplumber requests beautifulsoup4 lxml

      - name: Configure Git
        run: |
          git config user.name "Kommun Monitor Bot"
          git config user.email "bot@kommun-monitor.se"

      - name: Run Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_ACTIONS: true
        run: |
          cd scripts

          MODE="${{ github.event.inputs.mode || 'auto' }}"

          case $MODE in
            auto)
              echo "🔄 Running full auto pipeline..."
              python pipeline.py --max 5
              ;;
            discover-only)
              echo "🔍 Discovery only..."
              python pipeline.py --discover-only
              ;;
            retry)
              echo "🔄 Retrying pending..."
              python pipeline.py --retry
              ;;
            backfill-2025)
              echo "📚 Backfilling 2025..."
              python pipeline.py --backfill 2025 --max 10
              ;;
            backfill-2026)
              echo "📚 Backfilling 2026..."
              python pipeline.py --backfill 2026 --max 10
              ;;
            process-known)
              echo "📄 Processing known protocols in batches of 5..."
              TOTAL=$(python -c "import json; d=json.load(open('../data/known_protocols.json')); print(len([p for p in d['protocols'] if p.get('pdf_url')]))")
              DONE=0
              for i in $(seq 1 20); do
                echo ""
                echo "=== Batch $i (processed so far: $DONE) ==="
                python pipeline.py --process-known --skip-git --max 5

                cd ..
                git add -A
                if git diff --cached --quiet; then
                  echo "No new changes — all done!"
                  break
                fi
                NEW=$(git diff --cached --name-only | grep -c "output/" || true)
                git commit -m "Batch $i: +${NEW} protokoll processade"
                git push
                DONE=$((DONE + NEW))
                echo "Committed batch $i ($NEW new files)"
                cd scripts
              done
              ;;
            dry-run)
              echo "🧪 Dry run..."
              python pipeline.py --dry-run
              ;;
          esac

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/
          retention-days: 14

      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        if: success()
        uses: actions/deploy-pages@v4

  # Separate job: retry pending protocols every 3 days
  retry-pending:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 5 * * 1'  # Monday mornings only
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - name: Retry pending
        run: |
          cd scripts
          python -c "
          from discovery import retry_pending
          found = retry_pending(max_retries=10)
          for p in found:
              print(f'Found: {p[\"organ\"]} {p[\"meeting_date\"]}')
          print(f'Total found: {len(found)}')
          "
